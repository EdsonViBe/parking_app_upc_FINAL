@if (visible) {
  <div class="cookie-banner">
    <div class="cookie-content">
      <span class="cookie-icon">🍪</span>
      <p>
        Usamos cookies para recordar los datos que ingresas en los formularios
        (búsquedas, reservas, registro) y así no tengas que volver a escribirlos
        si cierras la página o vuelves más tarde.
      </p>
    </div>
    <button class="btn btn-primary btn-sm" (click)="accept()">Entendido</button>
  </div>
}
